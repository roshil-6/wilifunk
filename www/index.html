<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wilifunk Arcade</title>
    <meta name="description" content="Welcome to the Wilifunk Arcade! Play the best retro, arcade, and indie games including Space Rocket, 2D F1, and Shasticks directly in your browser.">
    <meta name="keywords" content="wilifunk, arcade, games, retro games, f1 racing, 2d games, html5 games, free games">
    <meta property="og:title" content="Wilifunk Arcade">
    <meta property="og:description" content="Play the best retro and arcade games including Space Rocket, 2D F1, and Shasticks directly in your browser.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hubUI" class="hub-container">
        <header class="hub-header">
            <h1 class="hub-title">Wilifunk Arcade</h1>
            <p class="hub-subtitle">Choose your next adventure</p>
        </header>

        <div class="games-grid">
            <!-- Space Rocket -->
            <div class="game-card" onclick="launchGame('games/space-rocket/index.html')">
                <div class="card-image space-rocket-bg"></div>
                <div class="card-content">
                    <h2>Space Rocket</h2>
                    <p>Navigate the deep space, collect stars, and shoot UFOs!</p>
                    <button class="play-btn">PLAY</button>
                </div>
            </div>

            <!-- Arcade Game 2D -->
            <div class="game-card" onclick="launchGame('games/arcade-2d/dist/index.html')">
                <div class="card-image arcade-bg"></div>
                <div class="card-content">
                    <h2>Arcade 2D</h2>
                    <p>Classic T-Rex and Hunter action. Jump and survive!</p>
                    <button class="play-btn">PLAY</button>
                </div>
            </div>

            <!-- Shasticks -->
            <div class="game-card" onclick="launchGame('games/shasticks/index.html')">
                <div class="card-image shasticks-bg"></div>
                <div class="card-content">
                    <h2>Shasticks 2D</h2>
                    <p>Action packed 2D fun. Coming soon.</p>
                    <button class="play-btn">PLAY</button>
                </div>
            </div>

            <!-- F1 Retro Arcade -->
            <div class="game-card" onclick="launchGame('games/f1-retro/index.html')">
                <div class="card-image f1-bg"></div>
                <div class="card-content">
                    <h2>F1 Retro Arcade</h2>
                    <p>High speed retro racing. Coming soon.</p>
                    <button class="play-btn">PLAY</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Iframe Container for Games -->
    <div id="gameContainer" class="hidden">
        <button id="backToHubBtn" onclick="closeGame()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Home
        </button>
        <iframe id="gameFrame" src="" frameborder="0"></iframe>
    </div>

    <script src="hub.js"></script>
</body>
</html>
